<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Leaderboard System</title>
    <meta name="description" content="Real-time quiz leaderboard system with API polling, deduplication, and score aggregation">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </div>
                    <div>
                        <h1>Quiz Leaderboard</h1>
                        <p class="subtitle">Real-time Score Aggregation System</p>
                    </div>
                </div>
                <div class="header-badge" id="statusBadge">
                    <span class="badge-dot"></span>
                    Ready
                </div>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section" id="inputSection">
            <div class="card input-card">
                <div class="card-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <h2>Configuration</h2>
                </div>
                <div class="input-group">
                    <label for="regNo">Registration Number</label>
                    <input type="text" id="regNo" placeholder="e.g. 2024CS101" autocomplete="off" spellcheck="false">
                </div>
                <button id="startBtn" class="btn-primary" onclick="startQuiz()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    Start Polling
                </button>
            </div>
        </section>

        <!-- Progress Section -->
        <section class="progress-section hidden" id="progressSection">
            <div class="card">
                <div class="card-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <h2>Polling Progress</h2>
                    <span class="poll-counter" id="pollCounter">0 / 10</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="poll-grid" id="pollGrid">
                    <!-- Poll indicators will be generated here -->
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card" id="statTotal">
                    <div class="stat-icon stat-icon-blue">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <div class="stat-value" id="totalEventsValue">0</div>
                    <div class="stat-label">Total Events</div>
                </div>
                <div class="stat-card" id="statUnique">
                    <div class="stat-icon stat-icon-green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-value" id="uniqueEventsValue">0</div>
                    <div class="stat-label">Unique Events</div>
                </div>
                <div class="stat-card" id="statDupes">
                    <div class="stat-icon stat-icon-amber">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                    </div>
                    <div class="stat-value" id="duplicatesValue">0</div>
                    <div class="stat-label">Duplicates Removed</div>
                </div>
                <div class="stat-card" id="statScore">
                    <div class="stat-icon stat-icon-purple">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <div class="stat-value" id="totalScoreValue">—</div>
                    <div class="stat-label">Total Score</div>
                </div>
            </div>
        </section>

        <!-- Live Log -->
        <section class="log-section hidden" id="logSection">
            <div class="card">
                <div class="card-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                    </svg>
                    <h2>Activity Log</h2>
                </div>
                <div class="log-container" id="logContainer">
                    <!-- Log entries will appear here -->
                </div>
            </div>
        </section>

        <!-- Leaderboard -->
        <section class="leaderboard-section hidden" id="leaderboardSection">
            <div class="card">
                <div class="card-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C6 4 6 2 12 2s6 2 7.5 2a2.5 2.5 0 0 1 0 5H18"/>
                        <path d="M18 14v-3a6 6 0 0 0-12 0v3"/><path d="M6 14a6 6 0 0 0 12 0"/>
                        <path d="M12 14v8"/><path d="M8 22h8"/>
                    </svg>
                    <h2>Leaderboard</h2>
                </div>
                <div class="leaderboard-table-wrapper">
                    <table class="leaderboard-table" id="leaderboardTable">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Participant</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <!-- Rows will be generated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Result Section -->
        <section class="result-section hidden" id="resultSection">
            <div class="card result-card" id="resultCard">
                <div class="result-icon" id="resultIcon">✓</div>
                <h2 id="resultTitle">Submission Result</h2>
                <p id="resultMessage"></p>
                <div class="result-details" id="resultDetails"></div>
                <button class="btn-secondary" onclick="resetApp()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    Run Again
                </button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
